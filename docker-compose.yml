services:
  flask:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - 5001:5001
    volumes:
      - ./api:/app
      - ./db.py:/app/db.py  # Dodaj to również tutaj, jeśli api też go używa
    image: api:v1
    container_name: api
  
  broker:
    build:
      context: ./broker
      dockerfile: Dockerfile
    ports: 
      - 1883:1883
    image: broker:v1
    container_name: broker
  
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    ports:
      - 5432:5432
    image: database:v1
    container_name: postgres

  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: ingestor
    depends_on:
      - broker
      - database
    volumes:
      - ./ingestor:/app
      - ./db.py:/app/db.py  # KLUCZOWA LINIA: mapuje plik z głównego katalogu do kontenera
    working_dir: /app
